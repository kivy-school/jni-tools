[build-system]
requires = ["setuptools>=68", "wheel", "cython>=3.0", "jni_core"]
build-backend = "setuptools.build_meta"

[project]
name = "commons-csv-jni-core"
version = "1.11.0"
description = "jni_core Cython wrappers for Apache commons-csv 1.11.0. Generated by jni-wrap; do not edit by hand."
requires-python = ">=3.11"
dependencies = [
    "jni-core",
]

# [tool.uv.sources]
# jni-core = { path = "../../../../jni-core" }

[tool.uv.pip]
extra-index-url = [
    "https://pypi.anaconda.org/pyswift/simple",
    "https://pypi.anaconda.org/kivyschool/simple"
]
find-links = ["../../../../test-app4/wheelhouse"]

[tool.setuptools.package-data]
"*" = ["*.pxd", "*.pyi"]

[tool.setuptools.exclude-package-data]
"*" = ["*.c", "*.pyx"]

[tool.cibuildwheel]
build = "cp313-android_*"

[tool.cibuildwheel.android]
archs = ["arm64_v8a", "x86_64"]

[tool.cibuildwheel.environment]
PIP_FIND_LINKS = "../../../../test-app4/wheelhouse"