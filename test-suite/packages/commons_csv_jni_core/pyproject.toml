[build-system]
requires = ["setuptools>=68", "wheel", "cython>=3.0", "jni_core"]
build-backend = "setuptools.build_meta"

[project]
name = "commons-csv-jni-core"
version = "1.11.0"
description = "jni_core Cython wrappers for Apache commons-csv 1.11.0. Generated by jni-wrap; do not edit by hand."
requires-python = ">=3.11"
