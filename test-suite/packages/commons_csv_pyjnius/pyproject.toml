[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "commons-csv-pyjnius"
version = "1.11.0"
description = "pyjnius wrappers for Apache commons-csv 1.11.0. Generated by jni-wrap; do not edit by hand."
requires-python = ">=3.11"
dependencies = ["pyjnius"]

[tool.hatch.build.targets.wheel]
packages = ["src/commons_csv_pyjnius"]
