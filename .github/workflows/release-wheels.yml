name: Release wheels

on:
  release:
    types: [published]

permissions:
  contents: write   # needed to upload assets to the release

jobs:
  # ---------------------------------------------------------------------------
  # macOS — universal2 binary (arm64 + x86_64 via lipo)
  # ---------------------------------------------------------------------------
  build-macos:
    name: Build macOS universal2 wheel
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Print Swift version
        run: swift --version

      - uses: astral-sh/setup-uv@v6

      - name: Build arm64 binary
        working-directory: jni-wrapper/JniWrap
        run: swift build --configuration release --arch arm64
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Build x86_64 binary
        working-directory: jni-wrapper/JniWrap
        run: swift build --configuration release --arch x86_64
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Create universal binary and stub dylibs
        run: |
          mkdir -p bin

          # Merge jni-wrap executable into a universal2 binary
          lipo -create \
            jni-wrapper/JniWrap/.build/arm64-apple-macosx/release/jni-wrap \
            jni-wrapper/JniWrap/.build/x86_64-apple-macosx/release/jni-wrap \
            -output bin/jni-wrap
          chmod +x bin/jni-wrap
          lipo -info bin/jni-wrap

          # Create universal2 stub dylibs for every @rpath dependency.
          # jni-wrap statically embeds all SwiftJava symbols (SPM compiles the
          # JavaLangReflect/etc. static products which pull in SwiftJava sources).
          # Stubs satisfy dyld's load requirement without re-registering ObjC
          # classes, eliminating the "Class implemented in both" warnings.
          echo 'void __jni_wrap_stub(void){}' > /tmp/stub.c
          for dep in $(otool -L bin/jni-wrap | grep '@rpath/' | awk '{print $1}' | sed 's|@rpath/||'); do
            clang -dynamiclib \
              -compatibility_version 0.0.0 -current_version 0.0.0 \
              -arch arm64 -arch x86_64 \
              -o "bin/$dep" /tmp/stub.c
            echo "Created stub: bin/$dep"
          done
          rm /tmp/stub.c

      - name: Build wheel
        run: uv build --wheel
        env:
          JNI_TOOLS_SKIP_SWIFT_BUILD: "1"

      - name: Smoke test wheel
        run: |
          uv venv /tmp/smoke
          uv pip install --python /tmp/smoke dist/*.whl
          /tmp/smoke/bin/jni-wrap --help

      - name: Upload wheel to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl

  # ---------------------------------------------------------------------------
  # Linux — x86_64 binary
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build Linux x86_64 wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - uses: astral-sh/setup-uv@v6

      - name: Build x86_64 binary
        working-directory: jni-wrapper/JniWrap
        run: swift build --configuration release
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Stage binary and Swift runtime libs
        run: |
          mkdir -p bin
          cp jni-wrapper/JniWrap/.build/release/jni-wrap bin/jni-wrap
          chmod +x bin/jni-wrap
          # Bundle product .so files built alongside the binary (e.g. libSwiftJava.so).
          # Do NOT use -maxdepth 1: swift-java 0.4.0 may place libSwiftJava.so in a
          # nested subdirectory of the release dir rather than at the top level.
          find jni-wrapper/JniWrap/.build/release \
            -name "*.so" \
            -not -path "*/checkouts/*" \
            -not -path "*/index-build/*" \
            -exec cp -v {} bin/ \;
          # Locate the Swift runtime library directory
          SWIFT_LIB=$(swiftc -print-target-info | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['paths']['runtimeLibraryPaths'][0])")
          echo "Swift runtime dir: $SWIFT_LIB"
          BUILD_RELEASE=$(realpath jni-wrapper/JniWrap/.build/release)
          # Bundle every lib that jni-wrap dynamically resolves: Swift runtime libs
          # and any product .so from the build dir not already copied above.
          LD_LIBRARY_PATH="$SWIFT_LIB:$BUILD_RELEASE:bin" ldd bin/jni-wrap | awk '{print $3}' | while read f; do
            case "$f" in
              "$SWIFT_LIB"*|"$BUILD_RELEASE"*) cp -vn "$f" bin/ || true ;;
            esac
          done
          ls -la bin/

      - name: Build wheel
        run: uv build --wheel
        env:
          JNI_TOOLS_SKIP_SWIFT_BUILD: "1"

      - name: Smoke test wheel
        run: |
          uv venv /tmp/smoke
          uv pip install --python /tmp/smoke dist/*.whl
          LD_LIBRARY_PATH="/tmp/smoke/bin" /tmp/smoke/bin/jni-wrap --help

      - name: Upload wheel to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl

  # ---------------------------------------------------------------------------
  # Windows — x86_64 binary
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build Windows x86_64 wheel
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Swift
        shell: pwsh
        run: |
          Invoke-WebRequest "https://download.swift.org/swift-6.2.4-release/windows10/swift-6.2.4-RELEASE/swift-6.2.4-RELEASE-windows10.exe" -OutFile swift.exe -UseBasicParsing
          $proc = Start-Process -FilePath ".\swift.exe" -ArgumentList "/S" -Wait -PassThru
          Write-Output "Installer exit code: $($proc.ExitCode)"
          $base = "$env:LOCALAPPDATA\Programs\Swift"
          Add-Content $env:GITHUB_PATH "$base\Toolchains\6.2.4+Asserts\usr\bin"
          Add-Content $env:GITHUB_PATH "$base\Runtimes\6.2.4\usr\bin"
          $sdk = Get-ChildItem "$base\Platforms" -Recurse -Filter "Windows.sdk" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($sdk) {
            Write-Output "SDKROOT=$($sdk.FullName)" >> $env:GITHUB_ENV
            Write-Output "SDK found: $($sdk.FullName)"
          } else {
            Write-Error "Windows.sdk not found under $base\Platforms"
          }

      - name: Verify Swift
        shell: pwsh
        run: swift --version

      - uses: astral-sh/setup-uv@v6

      - name: Build x86_64 binary
        working-directory: jni-wrapper/JniWrap
        run: swift build --configuration release -Xswiftc -Onone -Xlinker /force:multiple
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Stage binary and Swift DLLs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin
          $buildDir = "jni-wrapper\JniWrap\.build\x86_64-unknown-windows-msvc\release"
          Copy-Item "$buildDir\jni-wrap.exe" bin\jni-wrap.exe
          Get-ChildItem $buildDir -Filter "*.dll" | ForEach-Object {
            Copy-Item $_.FullName "bin\$($_.Name)"
            Write-Output "Bundled product DLL: $($_.Name)"
          }
          $runtimeDir = "$env:LOCALAPPDATA\Programs\Swift\Runtimes\6.2.4\usr\bin"
          Get-ChildItem $runtimeDir -Filter "*.dll" | ForEach-Object {
            Copy-Item $_.FullName "bin\$($_.Name)"
            Write-Output "Bundled runtime DLL: $($_.Name)"
          }
          Get-ChildItem bin\

      - name: Build wheel
        run: uv build --wheel
        env:
          JNI_TOOLS_SKIP_SWIFT_BUILD: "1"

      - name: Smoke test wheel
        shell: pwsh
        run: |
          uv venv C:\smoke
          $whl = (Get-ChildItem dist\*.whl | Select-Object -First 1).FullName
          uv pip install --python C:\smoke $whl
          C:\smoke\Scripts\jni-wrap.exe --help

      - name: Upload wheel to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
