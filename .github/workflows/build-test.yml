name: Build test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Linux — x86_64 binary
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build Linux x86_64 wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - uses: astral-sh/setup-uv@v6

      - name: Build x86_64 binary
        working-directory: jni-wrapper/JniWrap
        run: swift build --configuration release
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Stage binary and Swift runtime libs
        run: |
          mkdir -p bin
          cp jni-wrapper/JniWrap/.build/release/jni-wrap bin/jni-wrap
          chmod +x bin/jni-wrap
          # Locate the Swift runtime library directory
          SWIFT_LIB=$(swiftc -print-target-info | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['paths']['runtimeLibraryPaths'][0])")
          echo "Swift runtime dir: $SWIFT_LIB"
          # Bundle every Swift runtime lib that jni-wrap resolves to (by path prefix)
          LD_LIBRARY_PATH="$SWIFT_LIB" ldd bin/jni-wrap | awk '{print $3}' | while read f; do
            case "$f" in "$SWIFT_LIB"*) cp -v "$f" bin/ || true ;; esac
          done
          ls -la bin/

      - name: Build wheel
        run: uv build --wheel
        env:
          JNI_TOOLS_SKIP_SWIFT_BUILD: "1"

      - name: Smoke test wheel
        run: |
          uv venv /tmp/smoke
          uv pip install --python /tmp/smoke dist/*.whl
          LD_LIBRARY_PATH="/tmp/smoke/bin" /tmp/smoke/bin/jni-wrap --help

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-x86_64
          path: dist/*.whl

  # ---------------------------------------------------------------------------
  # Windows — x86_64 binary
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build Windows x86_64 wheel
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Swift
        shell: pwsh
        run: |
          Invoke-WebRequest "https://download.swift.org/swift-6.2.4-release/windows10/swift-6.2.4-RELEASE/swift-6.2.4-RELEASE-windows10.exe" -OutFile swift.exe -UseBasicParsing
          $proc = Start-Process -FilePath ".\swift.exe" -ArgumentList "/S" -Wait -PassThru
          Write-Output "Installer exit code: $($proc.ExitCode)"
          $base = "$env:LOCALAPPDATA\Programs\Swift"
          # Toolchain binaries + runtime DLLs on PATH
          Add-Content $env:GITHUB_PATH "$base\Toolchains\6.2.4+Asserts\usr\bin"
          Add-Content $env:GITHUB_PATH "$base\Runtimes\6.2.4\usr\bin"
          # SDKROOT — swiftc needs this to find the standard library on Windows
          $sdk = Get-ChildItem "$base\Platforms" -Recurse -Filter "Windows.sdk" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($sdk) {
            Write-Output "SDKROOT=$($sdk.FullName)" >> $env:GITHUB_ENV
            Write-Output "SDK found: $($sdk.FullName)"
          } else {
            Write-Error "Windows.sdk not found under $base\Platforms"
          }

      - name: Verify Swift
        shell: pwsh
        run: swift --version

      - uses: astral-sh/setup-uv@v6

      - name: Build x86_64 binary
        working-directory: jni-wrapper/JniWrap
        run: swift build --configuration release -Xswiftc -Onone -Xlinker /force:multiple
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Stage binary and Swift DLLs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin
          $buildDir = "jni-wrapper\JniWrap\.build\x86_64-unknown-windows-msvc\release"
          Copy-Item "$buildDir\jni-wrap.exe" bin\jni-wrap.exe
          # Bundle Swift product DLLs built alongside the executable
          Get-ChildItem $buildDir -Filter "*.dll" | ForEach-Object {
            Copy-Item $_.FullName "bin\$($_.Name)"
            Write-Output "Bundled product DLL: $($_.Name)"
          }
          # Bundle Swift runtime DLLs (needed on machines without Swift installed)
          $runtimeDir = "$env:LOCALAPPDATA\Programs\Swift\Runtimes\6.2.4\usr\bin"
          Get-ChildItem $runtimeDir -Filter "*.dll" | ForEach-Object {
            Copy-Item $_.FullName "bin\$($_.Name)"
            Write-Output "Bundled runtime DLL: $($_.Name)"
          }
          Get-ChildItem bin\

      - name: Build wheel
        run: uv build --wheel
        env:
          JNI_TOOLS_SKIP_SWIFT_BUILD: "1"

      - name: Smoke test wheel
        shell: pwsh
        run: |
          uv venv C:\smoke
          $whl = (Get-ChildItem dist\*.whl | Select-Object -First 1).FullName
          uv pip install --python C:\smoke $whl
          C:\smoke\Scripts\jni-wrap.exe --help

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-windows-x86_64
          path: dist/*.whl
