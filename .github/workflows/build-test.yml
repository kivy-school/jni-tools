name: Build test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # macOS — universal2 binary (arm64 + x86_64 via lipo)
  # ---------------------------------------------------------------------------
  build-macos:
    name: Build macOS universal2 wheel
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Print Swift version
        run: swift --version

      - uses: astral-sh/setup-uv@v6

      - name: Build arm64 binary
        working-directory: jni-wrapper/JniWrap
        run: swift build --configuration release --arch arm64
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Build x86_64 binary
        working-directory: jni-wrapper/JniWrap
        run: swift build --configuration release --arch x86_64
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Create universal binary and stub dylibs
        run: |
          mkdir -p bin

          lipo -create \
            jni-wrapper/JniWrap/.build/arm64-apple-macosx/release/jni-wrap \
            jni-wrapper/JniWrap/.build/x86_64-apple-macosx/release/jni-wrap \
            -output bin/jni-wrap
          chmod +x bin/jni-wrap
          lipo -info bin/jni-wrap

          echo 'void __jni_wrap_stub(void){}' > /tmp/stub.c
          for dep in $(otool -L bin/jni-wrap | grep '@rpath/' | awk '{print $1}' | sed 's|@rpath/||'); do
            clang -dynamiclib \
              -compatibility_version 0.0.0 -current_version 0.0.0 \
              -arch arm64 -arch x86_64 \
              -o "bin/$dep" /tmp/stub.c
            echo "Created stub: bin/$dep"
          done
          rm /tmp/stub.c

      - name: Build wheel
        run: uv build --wheel
        env:
          JNI_TOOLS_SKIP_SWIFT_BUILD: "1"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-universal2
          path: dist/*.whl

  # ---------------------------------------------------------------------------
  # Linux — x86_64 binary
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build Linux x86_64 wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - uses: astral-sh/setup-uv@v6

      - name: Build x86_64 binary
        working-directory: jni-wrapper/JniWrap
        run: swift build --configuration release
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Stage binary and stub dylibs
        run: |
          mkdir -p bin
          cp jni-wrapper/JniWrap/.build/release/jni-wrap bin/jni-wrap
          chmod +x bin/jni-wrap
          echo 'void __jni_wrap_stub(void){}' > /tmp/stub.c
          for dep in $(objdump -p bin/jni-wrap 2>/dev/null | grep 'NEEDED' | awk '{print $2}' | grep -v '^lib'); do
            gcc -shared -fPIC -o "bin/$dep" /tmp/stub.c 2>/dev/null && echo "Created stub: bin/$dep" || true
          done
          rm -f /tmp/stub.c

      - name: Build wheel
        run: uv build --wheel
        env:
          JNI_TOOLS_SKIP_SWIFT_BUILD: "1"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-x86_64
          path: dist/*.whl
