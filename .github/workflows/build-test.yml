name: Build test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Linux — x86_64 binary
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build Linux x86_64 wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - uses: astral-sh/setup-uv@v6

      - name: Build x86_64 binary
        working-directory: jni-wrapper/JniWrap
        run: swift build --configuration release
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Stage binary and stub dylibs
        run: |
          mkdir -p bin
          cp jni-wrapper/JniWrap/.build/release/jni-wrap bin/jni-wrap
          chmod +x bin/jni-wrap
          echo 'void __jni_wrap_stub(void){}' > /tmp/stub.c
          for dep in $(objdump -p bin/jni-wrap 2>/dev/null | grep 'NEEDED' | awk '{print $2}' | grep -v '^lib'); do
            gcc -shared -fPIC -o "bin/$dep" /tmp/stub.c 2>/dev/null && echo "Created stub: bin/$dep" || true
          done
          rm -f /tmp/stub.c

      - name: Build wheel
        run: uv build --wheel
        env:
          JNI_TOOLS_SKIP_SWIFT_BUILD: "1"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-x86_64
          path: dist/*.whl

  # ---------------------------------------------------------------------------
  # Windows — x86_64 binary
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build Windows x86_64 wheel
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Swift
        shell: pwsh
        run: |
          Invoke-WebRequest "https://download.swift.org/swift-6.2-release/windows10/swift-6.2-RELEASE/swift-6.2-RELEASE-windows10.exe" -OutFile swift.exe -UseBasicParsing
          Start-Process -FilePath .\swift.exe -ArgumentList "/S" -Wait -NoNewWindow
          $toolchain = Get-ChildItem "$env:LOCALAPPDATA\Programs\Swift\Toolchains" -ErrorAction Stop |
            Sort-Object Name -Descending | Select-Object -First 1
          echo "$($toolchain.FullName)\usr\bin" >> $env:GITHUB_PATH

      - uses: astral-sh/setup-uv@v6

      - name: Build x86_64 binary
        working-directory: jni-wrapper/JniWrap
        run: swift build --configuration release
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Stage binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin
          Copy-Item jni-wrapper\JniWrap\.build\release\jni-wrap.exe bin\jni-wrap.exe

      - name: Build wheel
        run: uv build --wheel
        env:
          JNI_TOOLS_SKIP_SWIFT_BUILD: "1"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-windows-x86_64
          path: dist/*.whl
