[build-system]
requires = ["setuptools>=68", "wheel", "Cython>=3.0"]
build-backend = "setuptools.build_meta"

[project]
name = "jni_core"
version = "0.1.0"
description = "Cython runtime shims (JNIEnv, conversions, base JavaObject) for code generated by jni-wrap's cython backend"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"

[project.urls]
Homepage = "https://github.com/kivy-school/jni-tools"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
jni_core = ["*.pxd", "*.pxi", "*.pyx"]
