[build-system]
requires = ["setuptools>=68", "wheel", "cython>=3.0", "jni-core"]
build-backend = "setuptools.build_meta"

[project]
name = "admob-jni-core"
version = "25.3.0"
description = "Cython JNI wrappers for Google AdMob play-services-ads-api 25.3.0. Generated by jni-wrap cython."
requires-python = ">=3.11"
dependencies = ["jni-core"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"*" = ["*.pxd", "*.pyi"]

[tool.setuptools.exclude-package-data]
"*" = [".DS_Store", "*.DS_Store", "*.c", "*.pyx", "*.pxi"]

# ---------------------------------------------------------------------------
# cibuildwheel — cross-compile for Android (cp313 first; add cp314 later)
# ---------------------------------------------------------------------------
[tool.cibuildwheel]
build = "cp313-android_*"

[tool.cibuildwheel.android]
archs = ["arm64_v8a", "x86_64"]

[tool.jni-wrap]
generator = "cython"
source = "play-services-ads-api-25.3.0.aar"
command = """
jni-wrap cython \
    play-services-ads-api-25.3.0.aar \
    examples/jni_core/admob/src
"""
