[build-system]
requires = ["setuptools>=68", "wheel", "cython>=3.0", "jni-core"]
build-backend = "setuptools.build_meta"

[project]
name = "onesignal-jni-core"
version = "4.8.10"
description = "Cython JNI wrappers for OneSignal Android SDK 4.8.10. Generated by jni-wrap cython."
requires-python = ">=3.11"
dependencies = ["jni-core"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"*" = ["*.pxd", "*.pyi"]

[tool.setuptools.exclude-package-data]
"*" = [".DS_Store", "*.DS_Store", "*.c", "*.pyx", "*.pxi"]

# ---------------------------------------------------------------------------
# cibuildwheel — cross-compile for Android (cp313 first; add cp314 later)
# ---------------------------------------------------------------------------
[tool.cibuildwheel]
build = "cp313-android_*"

[tool.cibuildwheel.android]
archs = ["arm64_v8a", "x86_64"]

[tool.jni-wrap]
generator = "cython"
source = "OneSignal-4.8.10.aar"
command = """
jni-wrap cython \
    OneSignal-4.8.10.aar \
    examples/jni_core/onesignal/src
"""
