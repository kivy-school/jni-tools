[build-system]
requires = ["hatchling", "cython>=3.0", "setuptools"]
build-backend = "hatchling.build"

[project]
name = "android-jni-core"
version = "35.0.0"
description = "Cython JNI wrappers for the Android framework (android.jar, API 35). Generated by pyjnius-wrap cython; intended as a stand-in until a hand-curated android-jni-core is published."
requires-python = ">=3.11"
dependencies = ["jni_core"]

[tool.hatch.build.targets.wheel]
packages = ["src/android"]

[tool.pyjnius-wrap]
generator = "cython"
source = "~/.psproject/android-sdk/platforms/android-35/android.jar"
command = """
swift run --package-path ../../../pyjnius-wrapper/PyjniusWrap pyjnius-wrap cython \
    --keep-package-prefix \
    ~/.psproject/android-sdk/platforms/android-35/android.jar \
    examples/jni_core/android/src
"""
