[build-system]
requires = ["setuptools>=68", "wheel", "cython>=3.0"]
build-backend = "setuptools.build_meta"

[project]
name = "android-jni-core"
version = "35.0.0"
description = "Cython JNI wrappers for the Android framework (android.jar, API 35). Generated by jni-wrap cython; intended as a stand-in until a hand-curated android-jni-core is published."
requires-python = ">=3.11"
dependencies = ["jni_core"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.exclude-package-data]
"*" = [".DS_Store", "*.DS_Store", "*.c", "*.pyx", "*.pxd", "*.pxi"]

# ---------------------------------------------------------------------------
# cibuildwheel — cross-compile for Android (cp313 first; add cp314 later)
# ---------------------------------------------------------------------------
[tool.cibuildwheel]
build = "cp313-android_*"

[tool.cibuildwheel.android]
archs = ["arm64_v8a", "x86_64"]

[tool.jni-wrap]
generator = "cython"
source = "~/.kivyschool/android-sdk/platforms/android-35/android.jar"
command = """
swift run --package-path ../../../jni-wrapper/JniWrap jni-wrap cython \
    --keep-package-prefix \
    ~/.kivyschool/android-sdk/platforms/android-35/android.jar \
    examples/jni_core/android/src
"""
